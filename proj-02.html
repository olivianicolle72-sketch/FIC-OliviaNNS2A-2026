<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="proj-02.css">
</head>
<body>
    <script src="proj-02.js"></script>
   <div class="calculator-card">
        <h2>Calculadora</h2>
        <p>Projeto 02 - Calculadora </p>

        <form>
            <div class="input-group">
                <label for="num1">Primeiro número</label>
                <input type="number" id="num1" step="any" placeholder="0.00">
            </div>

            <div class="input-group">
                <label for="num2">Segundo número</label>
                <input type="number" id="num2" step="any" placeholder="0.00">
            </div>

            <div class="input-group">
                <label for="operacao">Escolha a mágica</label>
                <select id="operacao">
                    <option value="soma">Soma (+)</option>
                    <option value="subtracao">Subtração (-)</option>
                    <option value="multiplicacao">Multiplicação (×)</option>
                    <option value="divisao">Divisão (÷)</option>
                </select>
            </div>

            <button type="button" id="calcular">Calcular</button>
        </form>

        <div id="resultado-container">
            <p id="resultado">Esperando números...</p>
        </div>
    </div>
</body>
</html>
