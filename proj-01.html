<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Verificar Idade</title>
  <link rel="stylesheet" href="proj-01.css"/>
</head>
<body>

 <div class="container">
        <h2>Verificação de Idade</h2>
        
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" placeholder="Digite o nome completo">
            
            <label for="idade">Idade:</label>
            <input type="number" id="idade" placeholder="Digite a idade">
            
            <button onclick="registrarIdade()">Registrar</button>
        </div>

        <h3>Registros</h3>
        <div class="table-wrapper">
            <table id="tabelaRegistros">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                  <!--Registro-->
                </tbody>
            </table>
        </div>
        
        <button class="btn-limpar" onclick="limparRegistros()">Limpar Tudo</button>
    </div>

    <script src="proj-01.js"></script>
</body>
</html>
